<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#EAF4FF" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#F5F9FF" stop-opacity="0"/>
    </radialGradient>
    
    <!-- Primary Blue Gradient -->
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0057FF"/>
      <stop offset="100%" stop-color="#003399"/>
    </linearGradient>

    <!-- Glassmorphism Card Gradient -->
    <linearGradient id="glassGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0.3"/>
    </linearGradient>

    <!-- Shadow -->
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#003399" flood-opacity="0.12"/>
    </filter>

    <!-- Accent Sky Blue Gradient -->
    <linearGradient id="skyGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38BDF8"/>
      <stop offset="100%" stop-color="#0057FF"/>
    </linearGradient>
  </defs>

  <!-- Background Glow -->
  <circle cx="250" cy="250" r="230" fill="url(#bgGrad)"/>

  <!-- Network Connection Nodes -->
  <g stroke="#0057FF" stroke-width="1.5" stroke-opacity="0.2" fill="none">
    <line x1="100" y1="120" x2="250" y2="80"/>
    <line x1="250" y1="80" x2="400" y2="140"/>
    <line x1="400" y1="140" x2="350" y2="300"/>
    <line x1="350" y1="300" x2="150" y2="350"/>
    <line x1="150" y1="350" x2="100" y2="120"/>
    <line x1="250" y1="80" x2="250" y2="250"/>
    <line x1="100" y1="120" x2="250" y2="250"/>
    <line x1="400" y1="140" x2="250" y2="250"/>
  </g>

  <!-- Nodes circles -->
  <g fill="#0057FF">
    <circle cx="100" cy="120" r="6"/>
    <circle cx="250" cy="80" r="8" fill="url(#blueGrad)"/>
    <circle cx="400" cy="140" r="6"/>
    <circle cx="350" cy="300" r="7" fill="url(#skyGrad)"/>
    <circle cx="150" cy="350" r="6"/>
  </g>

  <!-- Team Collaboration Hub (Center Platform) -->
  <g transform="translate(110, 150)" filter="url(#shadow)">
    <!-- Base Board -->
    <rect x="0" y="0" width="280" height="180" rx="24" fill="url(#glassGrad)" stroke="rgba(255,255,255,0.7)" stroke-width="2"/>
    
    <!-- Dashboard header inside base -->
    <rect x="24" y="20" width="80" height="12" rx="6" fill="#0057FF"/>
    <rect x="114" y="22" width="40" height="8" rx="4" fill="#E2E8F0"/>
    
    <!-- Code Blocks / Content -->
    <g transform="translate(24, 50)">
      <!-- Team Avatars representing working together -->
      <!-- Avatar 1 -->
      <circle cx="20" cy="30" r="16" fill="url(#blueGrad)"/>
      <path d="M 10 52 C 10 42, 30 42, 30 52" stroke="#FFFFFF" stroke-width="2" fill="none"/>
      
      <!-- Avatar 2 -->
      <circle cx="60" cy="30" r="16" fill="url(#skyGrad)"/>
      
      <!-- Avatar 3 -->
      <circle cx="100" cy="30" r="16" fill="#16A34A"/>

      <!-- Connecting Lines -->
      <path d="M 36 30 L 44 30 M 76 30 L 84 30" stroke="#94A3B8" stroke-width="2" stroke-dasharray="3 3"/>
    </g>

    <!-- Big Digital Growth Graph -->
    <path d="M 30 140 Q 90 100, 150 120 T 250 80" fill="none" stroke="url(#blueGrad)" stroke-width="4" stroke-linecap="round"/>
    <path d="M 30 140 Q 90 100, 150 120 T 250 80 L 250 150 L 30 150 Z" fill="url(#blueGrad)" fill-opacity="0.05"/>
    <circle cx="250" cy="80" r="6" fill="#003399"/>
  </g>

  <!-- Side Floating Widget 1 (E-commerce / Sales) -->
  <g transform="translate(30, 260)" filter="url(#shadow)">
    <rect x="0" y="0" width="130" height="100" rx="16" fill="url(#glassGrad)" stroke="rgba(255,255,255,0.6)" stroke-width="1.5"/>
    <text x="15" y="28" font-family="'Poppins', sans-serif" font-weight="700" font-size="12" fill="#0f172a">E-Commerce</text>
    <rect x="15" y="40" width="60" height="6" rx="3" fill="#64748b"/>
    <!-- Cart Icon -->
    <circle cx="95" cy="30" r="12" fill="url(#skyGrad)" fill-opacity="0.2"/>
    <path d="M 91 26 L 94 26 L 96 32 L 101 32 L 102 28 Z" fill="none" stroke="#0057FF" stroke-width="1.5"/>
    <!-- Stats Indicator -->
    <text x="15" y="75" font-family="'Poppins', sans-serif" font-weight="700" font-size="16" fill="#16A34A">+142%</text>
    <rect x="15" y="82" width="100" height="4" rx="2" fill="#16A34A" fill-opacity="0.2"/>
  </g>

  <!-- Side Floating Widget 2 (SEO Optimization Checklist) -->
  <g transform="translate(340, 60)" filter="url(#shadow)">
    <rect x="0" y="0" width="130" height="110" rx="16" fill="url(#glassGrad)" stroke="rgba(255,255,255,0.6)" stroke-width="1.5"/>
    <text x="15" y="24" font-family="'Poppins', sans-serif" font-weight="700" font-size="11" fill="#0f172a">SEO Performance</text>
    <!-- List item 1 Check -->
    <circle cx="20" cy="48" r="6" fill="#16A34A"/>
    <path d="M 18 48 L 20 50 L 23 46" stroke="#ffffff" stroke-width="1" fill="none"/>
    <rect x="32" y="45" width="70" height="6" rx="3" fill="#64748b"/>
    
    <!-- List item 2 Check -->
    <circle cx="20" cy="68" r="6" fill="#16A34A"/>
    <path d="M 18 68 L 20 70 L 23 66" stroke="#ffffff" stroke-width="1" fill="none"/>
    <rect x="32" y="65" width="80" height="6" rx="3" fill="#64748b"/>

    <!-- List item 3 Check -->
    <circle cx="20" cy="88" r="6" fill="#16A34A"/>
    <path d="M 18 88 L 20 90 L 23 86" stroke="#ffffff" stroke-width="1" fill="none"/>
    <rect x="32" y="85" width="55" height="6" rx="3" fill="#64748b"/>
  </g>
</svg>
