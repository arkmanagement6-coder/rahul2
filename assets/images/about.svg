<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="100%" height="100%">
  <defs>
    <!-- Background Glow -->
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#EAF4FF" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#F5F9FF" stop-opacity="0"/>
    </radialGradient>
    
    <!-- Primary Blue Gradient -->
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0057FF"/>
      <stop offset="100%" stop-color="#003399"/>
    </linearGradient>

    <!-- Glassmorphism Card Gradient -->
    <linearGradient id="glassGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0.4"/>
    </linearGradient>

    <!-- Shadow -->
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#003399" flood-opacity="0.12"/>
    </filter>

    <!-- Accent Sky Blue Gradient -->
    <linearGradient id="skyGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38BDF8"/>
      <stop offset="100%" stop-color="#0057FF"/>
    </linearGradient>
  </defs>

  <!-- Background Light Glow -->
  <circle cx="250" cy="250" r="230" fill="url(#bgGrad)"/>

  <!-- Core Vision & Value Card -->
  <g transform="translate(100, 100)" filter="url(#shadow)">
    <!-- Base Plate -->
    <rect x="0" y="0" width="300" height="280" rx="24" fill="url(#glassGrad)" stroke="rgba(255,255,255,0.7)" stroke-width="2"/>
    
    <!-- Grid System Lines representing structured planning -->
    <line x1="30" y1="0" x2="30" y2="280" stroke="#0057FF" stroke-opacity="0.05" stroke-width="1"/>
    <line x1="60" y1="0" x2="60" y2="280" stroke="#0057FF" stroke-opacity="0.05" stroke-width="1"/>
    <line x1="90" y1="0" x2="90" y2="280" stroke="#0057FF" stroke-opacity="0.05" stroke-width="1"/>
    <line x1="120" y1="0" x2="120" y2="280" stroke="#0057FF" stroke-opacity="0.05" stroke-width="1"/>
    <line x1="150" y1="0" x2="150" y2="280" stroke="#0057FF" stroke-opacity="0.05" stroke-width="1"/>
    <line x1="180" y1="0" x2="180" y2="280" stroke="#0057FF" stroke-opacity="0.05" stroke-width="1"/>
    <line x1="210" y1="0" x2="210" y2="280" stroke="#0057FF" stroke-opacity="0.05" stroke-width="1"/>
    <line x1="240" y1="0" x2="240" y2="280" stroke="#0057FF" stroke-opacity="0.05" stroke-width="1"/>
    <line x1="270" y1="0" x2="270" y2="280" stroke="#0057FF" stroke-opacity="0.05" stroke-width="1"/>

    <!-- Decorative Circle Rings -->
    <circle cx="150" cy="140" r="80" fill="none" stroke="url(#skyGrad)" stroke-width="2" stroke-opacity="0.3" stroke-dasharray="4 4"/>
    <circle cx="150" cy="140" r="100" fill="none" stroke="url(#blueGrad)" stroke-width="1" stroke-opacity="0.15"/>

    <!-- Target Growth bars -->
    <rect x="50" y="200" width="30" height="50" rx="6" fill="#E2E8F0"/>
    <rect x="100" y="160" width="30" height="90" rx="6" fill="url(#skyGrad)"/>
    <rect x="150" y="110" width="30" height="140" rx="6" fill="url(#blueGrad)"/>
    <rect x="200" y="70" width="30" height="180" rx="6" fill="url(#skyGrad)"/>
    <rect x="250" y="130" width="30" height="120" rx="6" fill="#E2E8F0"/>

    <!-- Dynamic Overlay Elements -->
    <!-- Vision Eye Icon Overlay -->
    <g transform="translate(130, 20)">
      <circle cx="20" cy="20" r="28" fill="#FFFFFF" filter="url(#shadow)"/>
      <path d="M 6 20 C 6 20, 13 10, 20 10 C 27 10, 34 20, 34 20 C 34 20, 27 30, 20 30 C 13 30, 6 20, 6 20 Z" fill="none" stroke="#0057FF" stroke-width="2" stroke-linejoin="round"/>
      <circle cx="20" cy="20" r="5" fill="url(#blueGrad)"/>
    </g>
  </g>

  <!-- Puzzle Piece representing integration -->
  <g transform="translate(40, 250)" filter="url(#shadow)">
    <rect x="0" y="0" width="100" height="100" rx="16" fill="url(#glassGrad)" stroke="rgba(255,255,255,0.7)" stroke-width="1.5"/>
    <path d="M 30 50 C 30 40, 40 40, 40 30 C 40 20, 60 20, 60 30 C 60 40, 70 40, 70 50 C 70 60, 80 60, 80 70 C 80 80, 60 80, 60 80 L 40 80 C 40 80, 20 80, 20 70 C 20 60, 30 60, 30 50 Z" fill="url(#blueGrad)"/>
  </g>

  <!-- Business Success Trophy Badge -->
  <g transform="translate(330, 60)" filter="url(#shadow)">
    <circle cx="45" cy="45" r="45" fill="url(#glassGrad)" stroke="rgba(255,255,255,0.7)" stroke-width="1.5"/>
    <g transform="translate(25, 20)">
      <path d="M 5 8 C 5 2, 35 2, 35 8 L 35 15 C 35 25, 27 30, 20 30 C 13 30, 5 25, 5 15 Z" fill="url(#skyGrad)"/>
      <path d="M 20 30 L 20 36 M 12 36 L 28 36" stroke="#0057FF" stroke-width="3" stroke-linecap="round"/>
      <!-- Handles -->
      <path d="M 5 10 A 6 6 0 0 1 0 16 A 6 6 0 0 1 5 22" fill="none" stroke="#0057FF" stroke-width="2"/>
      <path d="M 35 10 A 6 6 0 0 0 40 16 A 6 6 0 0 0 35 22" fill="none" stroke="#0057FF" stroke-width="2"/>
    </g>
  </g>
</svg>
