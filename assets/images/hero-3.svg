<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="100%" height="100%">
  <defs>
    <!-- Background Glow -->
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#EAF4FF" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#F5F9FF" stop-opacity="0"/>
    </radialGradient>
    
    <!-- Primary Blue Gradient -->
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0057FF"/>
      <stop offset="100%" stop-color="#003399"/>
    </linearGradient>

    <!-- Glassmorphism Card Gradient -->
    <linearGradient id="glassGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0.4"/>
    </linearGradient>

    <!-- Shadow -->
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#003399" flood-opacity="0.12"/>
    </filter>

    <!-- Accent Sky Blue Gradient -->
    <linearGradient id="skyGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38BDF8"/>
      <stop offset="100%" stop-color="#0057FF"/>
    </linearGradient>
  </defs>

  <!-- Background Light Glow -->
  <circle cx="250" cy="250" r="230" fill="url(#bgGrad)"/>

  <!-- Desktop Monitor/Dashboard Container (Perspective Style) -->
  <g transform="translate(60, 90)" filter="url(#shadow)">
    <!-- Monitor Bezel -->
    <rect x="0" y="0" width="380" height="260" rx="20" fill="#0f172a"/>
    <!-- Screen Viewport -->
    <rect x="12" y="12" width="356" height="236" rx="10" fill="#f8fafc"/>
    
    <!-- Left Navigation Bar in Dashboard -->
    <rect x="12" y="12" width="70" height="236" rx="10" fill="#0f172a" fill-opacity="0.9"/>
    <!-- Nav Links (dots) -->
    <circle cx="47" cy="45" r="14" fill="#0057FF"/>
    <circle cx="47" cy="85" r="6" fill="#64748b"/>
    <circle cx="47" cy="115" r="6" fill="#64748b"/>
    <circle cx="47" cy="145" r="6" fill="#64748b"/>
    <circle cx="47" cy="175" r="6" fill="#64748b"/>

    <!-- Dashboard Main Area -->
    <!-- Top Header -->
    <rect x="94" y="28" width="100" height="12" rx="6" fill="#0f172a"/>
    <rect x="94" y="46" width="180" height="8" rx="4" fill="#94a3b8"/>
    <circle cx="340" cy="35" r="10" fill="#e2e8f0"/>

    <!-- Content Blocks (Grid cards in display) -->
    <!-- Card 1 (Analytics circle) -->
    <rect x="94" y="70" width="120" height="80" rx="12" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
    <circle cx="154" cy="105" r="24" fill="none" stroke="#e2e8f0" stroke-width="6"/>
    <path d="M 154 81 A 24 24 0 1 1 130 115" fill="none" stroke="#0057FF" stroke-width="6" stroke-linecap="round"/>
    <text x="154" y="110" font-family="'Poppins', sans-serif" font-weight="700" font-size="12" fill="#0f172a" text-anchor="middle">75%</text>

    <!-- Card 2 (Metrics List) -->
    <rect x="226" y="70" width="130" height="80" rx="12" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
    <rect x="240" y="85" width="80" height="6" rx="3" fill="#64748b"/>
    <rect x="240" y="98" width="100" height="6" rx="3" fill="#e2e8f0"/>
    <rect x="240" y="111" width="60" height="6" rx="3" fill="#e2e8f0"/>
    <circle cx="330" cy="120" r="8" fill="#16A34A" fill-opacity="0.2"/>

    <!-- Card 3 (Timeline Graph) -->
    <rect x="94" y="160" width="262" height="74" rx="12" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
    <path d="M 110 210 L 140 185 L 170 195 L 200 170 L 230 190 L 260 175 L 290 185 L 330 165" fill="none" stroke="url(#skyGrad)" stroke-width="3" stroke-linecap="round"/>
    <circle cx="330" cy="165" r="4" fill="#0057FF"/>

    <!-- Monitor Base Stand -->
    <path d="M 170 260 L 210 260 L 200 300 L 180 300 Z" fill="#475569"/>
    <rect x="140" y="300" width="100" height="8" rx="4" fill="#334155"/>
  </g>

  <!-- Giant floating Shield representing security -->
  <g transform="translate(340, 240)" filter="url(#shadow)">
    <rect x="0" y="0" width="120" height="120" rx="16" fill="url(#glassGrad)" stroke="rgba(255,255,255,0.7)" stroke-width="1.5"/>
    <circle cx="60" cy="60" r="32" fill="url(#blueGrad)"/>
    <!-- Shield Icon in circle -->
    <path d="M 60 42 L 74 48 L 74 60 C 74 72, 60 78, 60 78 C 60 78, 46 72, 46 60 L 46 48 Z" fill="none" stroke="#ffffff" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>
    <!-- Little Check inside shield -->
    <path d="M 55 60 L 59 64 L 66 56" fill="none" stroke="#ffffff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Speed Gauge Floating Widget -->
  <g transform="translate(20, 40)" filter="url(#shadow)">
    <rect x="0" y="0" width="110" height="100" rx="16" fill="url(#glassGrad)" stroke="rgba(255,255,255,0.6)" stroke-width="1.5"/>
    <text x="15" y="24" font-family="'Poppins', sans-serif" font-weight="700" font-size="11" fill="#0f172a">Load Speed</text>
    
    <path d="M 25 70 A 25 25 0 0 1 85 70" fill="none" stroke="#e2e8f0" stroke-width="6" stroke-linecap="round"/>
    <path d="M 25 70 A 25 25 0 0 1 78 50" fill="none" stroke="#16A34A" stroke-width="6" stroke-linecap="round"/>
    <text x="55" y="68" font-family="'Poppins', sans-serif" font-weight="700" font-size="12" fill="#16A34A" text-anchor="middle">98%</text>
  </g>
</svg>
